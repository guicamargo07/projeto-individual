<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Desempenho Geral</title>
    <link rel="stylesheet" href="./css/desempenho.css">
</head>

<body>

    <div class="container_header">
        <img src="./assets/img/cr7-logo.png" class="img-logo">

        <div class="navegador">
            <button class="btn-home" onclick="home()">Trajetória</button>
            <button class="btn-atributos" onclick="atributos()">Atributos</button>
            <button class="btn-conquistas" onclick="conquistas()">Conquistas</button>
            <button class="btn-sair" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="tabela-container">
        <h2>DESEMPENHO POR CLUBES E SELEÇÃO</h2>

        <table>
            <thead>
                <tr>
                    <th>Equipe</th>
                    <th>Partidas</th>
                    <th>Gols</th>
                    <th>Assistências</th>
                </tr>
            </thead>

            <tbody id="corpoTabela">
            </tbody>

            <tfoot>
                <tr>
                    <td>Total</td>
                    <td id="totalPartidas"></td>
                    <td id="totalGols"></td>
                    <td id="totalAssistencias"></td>
                </tr>
            </tfoot>
        </table>
    </div>

</body>

</html>

<script>
    const logos = {
        'Real Madrid': './assets/img/real.png',
        'Man Utd': './assets/img/united.png',
        'Al-Nassr': './assets/img/alnassr.png',
        'Juventus': './assets/img/juve.png',
        'Sporting': './assets/img/sporting.png',
        'Portugal': './assets/img/portugal.png'
    };

    async function carregarDesempenho() {
        const resposta = await fetch('http://localhost:3333/desempenho');
        const dados = await resposta.json();

        const tbody = document.getElementById('corpoTabela');
        tbody.innerHTML = '';

        dados.forEach(d => {
            tbody.innerHTML += `
                <tr>
                    <td>
                        <div class="clube">
                            <img src="${logos[d.nome] || ''}">
                            <span>${d.nome}</span>
                        </div>
                    </td>
                    <td>${d.partidas}</td>
                    <td>${d.gols}</td>
                    <td>${d.assistencias}</td>
                </tr>
            `;
        });

        let totalPartidas = 0;
        let totalGols = 0;
        let totalAssistencias = 0;

        for (let i = 0; i < dados.length; i++) {
            totalPartidas += dados[i].partidas;
            totalGols += dados[i].gols;
            totalAssistencias += dados[i].assistencias;
        }

        document.getElementById('totalPartidas').textContent = totalPartidas;
        document.getElementById('totalGols').textContent = totalGols;
        document.getElementById('totalAssistencias').textContent = totalAssistencias;
    }

    function home() {
        location.href = "home.html";
    }

    function conquistas() {
        location.href = "conquistas.html";
    }

    function logout() {
        location.href = "login.html";
    }

    function atributos() {
        location.href = "./dashboard/dashboard.html";
    }

    carregarDesempenho();
</script>
