<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cristiano Ronaldo</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container_header">
        <img src="../assets/img/cr7-logo.png" class="img-logo">

        <div class="navegador">

            <button class="btn-home" onclick="home()">
                Trajetória
            </button>

            <button class="btn-desempenho" onclick="desempenho()">
                Desempenho
            </button>

            <button class="btn-conquistas" onclick="conquistas()">
                Conquistas
            </button>

            <button class="btn-sair" onclick="logout()">
                Sair
            </button>
        </div>
    </div>

    <div class="main">

        <div class="topo">

            <div class="titulo">
                <h1 id="nome">Cristiano Ronaldo</h1>
                <p id="info"></p>
            </div>

            <select id="selectJogador" onchange="trocarJogador()">
                <option value="5">Sporting</option>
                <option value="1">Manchester United</option>
                <option value="0">Real Madrid</option>
                <option value="3">Juventus</option>
                <option value="4">Manchester United (2ª passagem)</option>
                <option value="2">Al-Nassr</option>
            </select>

        </div>

        <div class="kpis">

            <div class="kpi">
                <h3>Overall</h3>
                <p id="overall">-</p>
            </div>

            <div class="kpi">
                <h3>Altura</h3>
                <p id="altura">-</p>
            </div>

            <div class="kpi">
                <h3>Peso</h3>
                <p id="peso">-</p>
            </div>

            <div class="kpi">
                <h3>Ano</h3>
                <p id="ano">-</p>
            </div>

        </div>

        <div class="conteudo">

            <div class="card">
                <h2>Radar de Atributos</h2>
                <div class="grafico">
                    <canvas id="graficoRadar"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>Atributos</h2>
                <div id="listaAtributos"></div>
            </div>

        </div>

    </div>

    <script>

        let jogadores = [];

        fetch("/dashboard/listar")
            .then(function (resposta) {
                resposta.json().then(function (dados) {

                    for (let i = 0; i < dados.length; i++) {
                        jogadores.push({
                            clube: dados[i].clube,
                            ano: dados[i].ano,
                            posicao: dados[i].posicao,
                            overall: dados[i].overall,
                            altura: dados[i].altura,
                            peso: dados[i].peso,
                            atributos: [
                                dados[i].velocidade,
                                dados[i].finalizacao,
                                dados[i].passe,
                                dados[i].drible,
                                dados[i].defesa,
                                dados[i].fisico
                            ]
                        });
                    }

                    trocarJogador();

                });
            });

        let radar;

        function trocarJogador() {

            let indice = document.getElementById("selectJogador").value;
            let jogador = jogadores[indice];

            if (!jogador) return;

            document.getElementById("nome").innerHTML = "Cristiano Ronaldo";
            document.getElementById("info").innerHTML = jogador.posicao;
            document.getElementById("overall").innerHTML = jogador.overall;
            document.getElementById("altura").innerHTML = jogador.altura;
            document.getElementById("peso").innerHTML = jogador.peso;
            document.getElementById("ano").innerHTML = jogador.ano;

            criarRadar(jogador.atributos);
            mostrarAtributos(jogador.atributos);
        }

        function mostrarAtributos(atributos) {

            let nomes = ["Velocidade", "Finalização", "Passe", "Drible", "Defesa", "Físico"];
            let cores = ["#3fa7ff", "#ff7b54", "#80ff44", "#ff4dc4", "#b6ff2e", "#a855ff"];

            document.getElementById("listaAtributos").innerHTML = "";

            for (let i = 0; i < nomes.length; i++) {
                document.getElementById("listaAtributos").innerHTML += `
                    <div class="atributo">
                        <div class="atributo-topo">
                            <span>${nomes[i]}</span>
                            <span>${atributos[i]}</span>
                        </div>
                        <div class="barra">
                            <div class="preenchimento"
                            style="width:${atributos[i]}%; background:${cores[i]}">
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function criarRadar(atributos) {

            if (radar) {
                radar.destroy();
            }

            radar = new Chart(document.getElementById("graficoRadar"), {
                type: 'radar',
                data: {
                    labels: ['Velocidade', 'Finalização', 'Passe', 'Drible', 'Defesa', 'Físico'],
                    datasets: [{
                        label: 'Atributos',
                        data: atributos,
                        backgroundColor: 'rgba(63,167,255,0.2)',
                        borderColor: '#3fa7ff',
                        borderWidth: 2,
                        pointBackgroundColor: '#3fa7ff',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            ticks: {
                                color: '#7d8fb3',
                                backdropColor: 'transparent'
                            },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            angleLines: { color: 'rgba(255,255,255,0.1)' },
                            pointLabels: {
                                color: 'white',
                                font: { size: 13 }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: 'white' }
                        }
                    }
                }
            });
        }

        function desempenho() {
            location.href = "../desempenho.html";
        }

        function conquistas() {
            location.href = "../conquistas.html";
        }

        function logout() {
            location.href = "../login.html";
        }

        function home() {
            location.href = "../home.html";
        }

    </script>

</body>

</html>
