<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/cadastro.css">
</head>

<body>

    <button class="btn-voltar" onclick="voltar()">Voltar</button>

    <div class="container">

        <div class="logo">
            <img src="./assets/img/cr7-logo.png" alt="Logo">
        </div>

        <form class="formulario">

            <h2>Cadastro</h2>

            <input type="text" id="input_nome" placeholder="Nome" oninput="validarNome()">
            <div id="mensagemnome"></div>

            <input type="email" id="input_email" placeholder="Email" oninput="validarEmail()">
            <div id="mensagememail"></div>

            <div class="sexo-group">
                <label>
                    <input type="radio" name="sexo" value="masculino" onchange="validarSexo()">
                    Masculino
                </label>
                <label>
                    <input type="radio" name="sexo" value="feminino" onchange="validarSexo()">
                    Feminino
                </label>
                <label>
                    <input type="radio" name="sexo" value="naoinforma" onchange="validarSexo()">
                    Prefiro não informar
                </label>
            </div>
            <div id="mensagemsexo"></div>

            <input type="text" id="input_jogador" placeholder="Jogador favorito (opcional)" oninput="validarJogador()">
            <div id="mensagemjogador"></div>

            <select id="input_posicao" onchange="validarPosicao()">
                <option value="">Posição favorita</option>
                <option value="goleiro">Goleiro</option>
                <option value="defensor">Defensor</option>
                <option value="meio-campo">Meio campo</option>
                <option value="atacante">Atacante</option>
                <option value="nao-tenho">Não tenho</option>
            </select>
            <div id="mensagemposicao"></div>

            <input type="text" id="input_clube" placeholder="Clube do coração" oninput="validarClube()">
            <div id="mensagemclube"></div>

            <input type="password" id="input_senha" placeholder="Senha" oninput="validarSenha()">
            <div id="mensagemsenha"></div>

            <input type="password" id="input_confirmar" placeholder="Confirmar senha" oninput="validarConfirmacao()">
            <div id="mensagemconfirmar"></div>

            <button type="button" class="btn-cadastro" onclick="cadastrar()">Cadastrar</button>

            <p class="link-login">
                Já possui uma conta?
                <a href="./login.html">Faça login</a>
            </p>

        </form>

    </div>

</body>

</html>

<script>

    function voltar() {
        location.href = "./inicial.html";
    }

    function validarJogador() {
        let jogador = input_jogador.value;
        if (jogador.length < 3) {
            mensagemjogador.innerHTML = `<span style="color:red">*Jogador inválido</span>`;
        } else {
            mensagemjogador.innerHTML = ``;
        }
    }

    function validarPosicao() {
        if (input_posicao.value === "") {
            mensagemposicao.innerHTML = `<span style="color:red">*Selecione uma posição</span>`;
        } else {
            mensagemposicao.innerHTML = ``;
        }
    }

    function validarClube() {
        let clube = input_clube.value;
        if (clube.length < 2) {
            mensagemclube.innerHTML = `<span style="color:red">*Clube inválido</span>`;
        } else {
            mensagemclube.innerHTML = ``;
        }
    }

    function validarSenha() {
        let senha = input_senha.value;
        let temMinuscula = false, temMaiuscula = false, temNumero = false, temEspecial = false;
        let mensagem = "";

        if (senha.length === 0) {
            input_senha.dataset.forte = "false";
            mensagemsenha.innerHTML = `<span style="color:red">*Digite uma senha</span>`;
            return;
        }

        for (let i = 0; i < senha.length; i++) {
            let char = senha[i];
            if (char >= 'a' && char <= 'z') temMinuscula = true;
            else if (char >= 'A' && char <= 'Z') temMaiuscula = true;
            else if (char >= '0' && char <= '9') temNumero = true;
            else temEspecial = true;
        }

        if (senha.length < 8) mensagem += "• 8 caracteres<br>";
        if (!temMinuscula) mensagem += "• letra minúscula<br>";
        if (!temMaiuscula) mensagem += "• letra maiúscula<br>";
        if (!temNumero) mensagem += "• número<br>";
        if (!temEspecial) mensagem += "• caractere especial<br>";

        if (mensagem === "") {
            input_senha.dataset.forte = "true";
            mensagemsenha.innerHTML = `<span style="color:green">Senha forte</span>`;
        } else {
            input_senha.dataset.forte = "false";
            mensagemsenha.innerHTML = `<span style="color:red">${mensagem}</span>`;
        }
    }

    function validarNome() {
        let nome = input_nome.value;
        mensagemnome.innerHTML = nome.length < 3
            ? `<span style="color:red">*Nome inválido</span>`
            : ``;
    }

    function validarEmail() {
        let email = input_email.value;
        mensagememail.innerHTML = (!email.includes("@") || !email.includes(".com"))
            ? `<span style="color:red">*Email inválido</span>`
            : ``;
    }

    function validarConfirmacao() {
        let confirmarsenha = input_confirmar.value;
        if (confirmarsenha === "") {
            mensagemconfirmar.innerHTML = `<span style="color:red">*Confirme a senha</span>`;
        } else if (confirmarsenha !== input_senha.value) {
            mensagemconfirmar.innerHTML = `<span style="color:red">*As senhas não coincidem</span>`;
        } else {
            mensagemconfirmar.innerHTML = ``;
        }
    }

    function validarSexo() {
        let sexoSelecionado = document.querySelector("input[name='sexo']:checked");
        mensagemsexo.innerHTML = sexoSelecionado == null
            ? `<span style="color:red">*Selecione o sexo</span>`
            : ``;
    }

    function cadastrar() {

        let nome = input_nome.value;
        let email = input_email.value;
        let sexoSelecionado = document.querySelector("input[name='sexo']:checked");
        let sexo = sexoSelecionado ? sexoSelecionado.value : "";
        let jogador = input_jogador.value;       
        let posicao = input_posicao.value;       
        let clube = input_clube.value;           
        let senha = input_senha.value;
        let confirmarsenha = input_confirmar.value;

        let contadorValidacoes = 0;

        if (nome.length < 3) {
            mensagemnome.innerHTML = `<span style="color:red">*Nome inválido</span>`;
        } else { mensagemnome.innerHTML = ``; contadorValidacoes++; }

        if (!email.includes("@") || !email.includes(".com")) {
            mensagememail.innerHTML = `<span style="color:red">*Email inválido</span>`;
        } else { mensagememail.innerHTML = ``; contadorValidacoes++; }

        if (sexoSelecionado == null) {
            mensagemsexo.innerHTML = `<span style="color:red">*Selecione o sexo</span>`;
        } else { mensagemsexo.innerHTML = ``; contadorValidacoes++; }

        if (jogador.length < 3) {
            mensagemjogador.innerHTML = `<span style="color:red">*Jogador inválido</span>`;
        } else { mensagemjogador.innerHTML = ``; contadorValidacoes++; }

        if (posicao === "") {
            mensagemposicao.innerHTML = `<span style="color:red">*Selecione uma posição</span>`;
        } else { mensagemposicao.innerHTML = ``; contadorValidacoes++; }

        if (clube.length < 2) {
            mensagemclube.innerHTML = `<span style="color:red">*Clube inválido</span>`;
        } else { mensagemclube.innerHTML = ``; contadorValidacoes++; }

        if (senha.length === 0) {
            mensagemsenha.innerHTML = `<span style="color:red">*Digite uma senha</span>`;
        } else if (input_senha.dataset.forte != "true") {
            mensagemsenha.innerHTML = `<span style="color:red">*Senha precisa ser forte</span>`;
        } else { contadorValidacoes++; }

        if (confirmarsenha !== senha) {
            mensagemconfirmar.innerHTML = `<span style="color:red">*As senhas não coincidem</span>`;
        } else if (confirmarsenha === "") {
            mensagemconfirmar.innerHTML = `<span style="color:red">*Confirme a senha</span>`;
        } else { mensagemconfirmar.innerHTML = ``; contadorValidacoes++; }

        if (contadorValidacoes == 8) {

            fetch("/usuarios/cadastrar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nomeServer: nome,
                    emailServer: email,
                    generoServer: sexo,
                    jogadorServer: jogador,     
                    posicaoServer: posicao,     
                    clubeServer: clube,         
                    senhaServer: senha
                })
            })

            .then(function (resposta) {

                if (resposta.ok) {

                    sessionStorage.NOME_USUARIO = nome;
                    sessionStorage.EMAIL_USUARIO = email;

                    mensagemconfirmar.innerHTML = `
                        <span style="color:green">Cadastro realizado! Redirecionando...</span>
                    `;

                    setTimeout(() => { location.href = "./login.html"; }, 2000);

                } else if (resposta.status === 409) {
                    mensagememail.innerHTML = `<span style="color:red">*Este email já está cadastrado</span>`;
                } else {
                    mensagememail.innerHTML = `<span style="color:red">*Erro ao realizar o cadastro</span>`;
                }

            })

            .catch(function (erro) { console.log(erro); });

        }
    }

</script>
